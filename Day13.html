<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ATM Machine</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .atm-container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      text-align: center;
      width: 300px;
    }

    h2 {
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #007bff;
    }

    .output {
      margin-top: 15px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>

<body>

  <div class="atm-container">
    <h2>ATM Machine</h2>

    <button onclick="checkBalance()">Check Balance</button>
    <button onclick="deposit()">Deposit Money</button>
    <button onclick="withdraw()">Withdraw Money</button>
    <button onclick="exitATM()">Exit</button>

    <div class="output" id="output"></div>
  </div>

  <script>
    let balance = 5000;

    function checkBalance() {
      document.getElementById("output").innerText =
        "Your Balance: ₹" + balance;
    }

    function deposit() {
      let dep = Number(prompt("Enter deposit amount"));
      if (isNaN(dep) || dep <= 0) {
        alert("Enter valid amount");
      } else {
        balance += dep;
        document.getElementById("output").innerText =
          "Deposited: ₹" + dep + " | Total: ₹" + balance;
      }
    }

    function withdraw() {
      let w = Number(prompt("Enter withdraw amount"));
      if (isNaN(w) || w <= 0) {
        alert("Enter valid amount");
      } else if (w > balance) {
        alert("Insufficient balance");
      } else {
        balance -= w;
        document.getElementById("output").innerText =
          "Withdrawn: ₹" + w + " | Remaining: ₹" + balance;
      }
    }

    function exitATM() {
      document.getElementById("output").innerText =
        "Thank you for using ATM!";
    }
  </script>

</body>
</html>
